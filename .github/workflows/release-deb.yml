name: Build .deb package

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential xutils-dev \
            libx11-dev libxext-dev libxaw7-dev libxt-dev libxmu-dev \
            libice-dev libsm-dev x11proto-dev \
            zlib1g-dev libjpeg-dev libwrap0-dev

      - name: Build viewer and utilities
        run: |
          cd vnc_unixsrc
          xmkmf -a
          make CDEBUGFLAGS="-O2" World

      - name: Build Xvnc server
        run: |
          cd vnc_unixsrc/Xvnc
          ./configure
          make AR="ar cq" EXTRA_LIBRARIES="-lwrap" CDEBUGFLAGS="-O2 -fcommon" \
               EXTRA_DEFINES="-DUSE_LIBWRAP=1"

      - name: Determine version
        id: version
        run: |
          base=$(grep '^Version:' vnc_unixsrc/tightvnc.spec | awk '{print $2}')
          rev=${{ github.run_number }}
          echo "version=${base}-${rev}netlinux1" >> "$GITHUB_OUTPUT"
          echo "tag=v${base}-${rev}netlinux1" >> "$GITHUB_OUTPUT"

      - name: Package with checkinstall
        run: |
          sudo apt-get install -y checkinstall
          cd vnc_unixsrc
          sudo mkdir -p /usr/share/man/man1
          sudo checkinstall --default \
            --pkgname=tightvnc \
            --pkgversion="${{ steps.version.outputs.version }}" \
            --maintainer="graham@netlinux.co.uk" \
            --pakdir=. \
            --install=no \
            --fstrans=no \
            ./vncinstall /usr/bin /usr/share/man

      - name: Repack .deb for reprepro compatibility
        run: |
          cd vnc_unixsrc
          DEB=$(ls tightvnc_*.deb)
          sudo chmod 666 "$DEB"
          mkdir repack && cd repack
          ar x "../$DEB"
          for f in *.zst; do
            [ -f "$f" ] || continue
            zstd -d "$f"
            xz "${f%.zst}"
            rm "$f"
          done
          rm "../$DEB"
          ar rcs "../$DEB" debian-binary control.tar.xz data.tar.xz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: tightvnc ${{ steps.version.outputs.version }}
          body: |
            TightVNC 1.3.10 (netlinux fork) — VNC server and viewer for Unix/Linux.

            Includes vncviewer with display scaling (-scale), SSH remote access
            (-sshvnc), automatic reconnection, bilinear interpolation, and Xvnc
            with rgb.txt color support.

            Automated build from commit ${{ github.sha }}

            Install: `sudo dpkg -i tightvnc_*.deb`
          files: vnc_unixsrc/tightvnc_*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify package repository
        run: |
          sleep 5
          SIGNATURE=$(echo -n '{"repo":"netlinux-ai/tightvnc","tag":"${{ steps.version.outputs.tag }}"}' \
            | openssl dgst -sha256 -hmac "${{ secrets.WEBHOOK_SECRET }}" -binary \
            | xxd -p -c 256)
          curl -sf -X POST \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Signature: sha256=${SIGNATURE}" \
            -d '{"repo":"netlinux-ai/tightvnc","tag":"${{ steps.version.outputs.tag }}"}' \
            https://packages.netlinux.co.uk/webhook/update-repo
